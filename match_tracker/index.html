<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Match Tracker – Spiel & Torschützen</title>

<style>

.topbar{
  position:sticky;
  top:0;
  z-index:1000;

  display:flex;
  justify-content:center;
  align-items:center;

  background:rgba(17,17,17,0.7);
  backdrop-filter:blur(10px);

  border-bottom:1px solid rgba(255,255,255,0.05);

  padding:10px 0;

  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.topbar-left{
font-weight:bold;
font-size:18px;
}

.topbar-right{
display:flex;
gap:16px;
font-size:13px;
opacity:.8;
}

body{
font-family:Arial,Helvetica,sans-serif;

background:#0f0f0f;  /* bleibt erstmal clean */

color:#eee;

margin:0;
padding:30px;

max-width:1400px;
margin:auto;

min-height:100vh;
display:flex;
flex-direction:column;
}

h1,h2{margin-top:30px}

.panel{
background:#181818;
padding:22px;
border-radius:14px;
margin-bottom:30px;
border:1px solid rgba(255,255,255,0.04);

/* 🔥 NEU */
box-shadow:0 10px 30px rgba(0,0,0,0.6);
backdrop-filter:blur(6px);
}

input,select{
height:42px;
padding:0 12px;

border-radius:10px;
border:1px solid rgba(255,255,255,0.08);

background:#1a1a1a;
color:#eee;

font-size:13px;

appearance:none;
-webkit-appearance:none;
-moz-appearance:none;

transition:.2s;
}

  #mode{
padding-right:28px;

background-image:url("data:image/svg+xml;utf8,<svg fill='%23aaa' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
background-repeat:no-repeat;
background-position:right 8px center;
background-size:14px;
}

button{
padding:8px 12px;
border-radius:10px;
border:none;
font-size:13px;
margin:4px 6px 4px 0;
display:inline-flex;
align-items:center;
gap:6px;
transition:all .2s ease;

/* 🔥 NEU */
font-weight:500;
letter-spacing:.2px;
}

/* 🔥 BASIS HOVER */
button:hover{
transform:translateY(-1px);
filter:brightness(1.2);
}

/* 🔵 PRIMARY */
button.primary{
height:42px;
padding:0 16px;

border-radius:10px;

background:linear-gradient(90deg,#3a7cff,#6c63ff);
color:#fff;

box-shadow:0 6px 16px rgba(58,124,255,0.25);
}

/* 🔴 DANGER */
button.danger{
background:rgba(201,42,42,0.15);
color:#ff4d4d;
}

button.danger:hover{
box-shadow:0 4px 12px rgba(201,42,42,0.3);
}

/* 🟢 SUCCESS / TOR */
button.success,
button.goal{
background:rgba(47,158,68,0.15);
color:#2f9e44;
}

button.success:hover,
button.goal:hover{
box-shadow:0 4px 12px rgba(47,158,68,0.3);
}

/* 🟡 GELB */
button.yellow{
background:rgba(212,160,23,0.15);
color:#d4a017;
}

button.yellow:hover{
box-shadow:0 4px 12px rgba(212,160,23,0.3);
}

/* 🔴 ROT */
button.red{
background:rgba(201,42,42,0.15);
color:#ff4d4d;
}

button.red:hover{
box-shadow:0 4px 12px rgba(201,42,42,0.3);
}

/* 🟣 WECHSEL */
button.sub{
background:rgba(108,99,255,0.15);
color:#8f88ff;
}

button.sub:hover{
box-shadow:0 4px 12px rgba(108,99,255,0.3);
}

/* ⚪ SECONDARY */
button.secondary{
background:#2a2a2a;
color:#aaa;
}

.matches-grid{
display:flex;
flex-direction:column;
gap:20px;
width:100%;
}

.match{
background:linear-gradient(180deg,#1b1b1b,#161616);
padding:18px;
border-radius:14px;
margin-bottom:12px;

border:1px solid rgba(255,255,255,0.05);

transition:all 0.25s ease;

/* 🔥 NEU */
box-shadow:0 6px 20px rgba(0,0,0,0.5);
}

.match-header{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
padding:10px 12px;
border-radius:10px;
background:#202020;
}

/* 🔥 PLAYER CHIP – GAME STYLE (FINAL) */
.player-chip{
display:flex;
align-items:center;
justify-content:space-between;

background:#2a2a2a;
color:#eee;

padding:5px 7px;
border-radius:6px;
margin:3px 0;
font-size:11px;
cursor:pointer;

transition:.15s;

position:relative;
overflow:hidden;

white-space:nowrap;
  border:1px solid rgba(255,255,255,0.06);
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* 🔥 SUBTILE EDGE */
.player-chip::before{
content:"";
position:absolute;
left:0;
top:0;
bottom:0;
width:2px;
background:rgba(255,255,255,0.15);
opacity:.4;
}

/* 🔥 HOVER */
.player-chip:hover{
transform:scale(1.03);
box-shadow:0 6px 16px rgba(0,0,0,0.6);
}

/* 🔥 POS COLORS (WIE PITCH) */

/* TW */
.player-chip.pos-TW{
background:#1e88e5;
}

/* DEF */
.player-chip.pos-IV,
.player-chip.pos-LV,
.player-chip.pos-RV{
background:#6d4c41;
}

/* MID */
.player-chip.pos-ZM,
.player-chip.pos-LM,
.player-chip.pos-RM{
background:#8e24aa;
}

/* ST */
.player-chip.pos-ST{
background:#e53935;
}

/* 🔥 PITCH GLEICHER STYLE */
.pitch-player{
background:#1f1f1f;
border:1px solid rgba(255,255,255,0.05);
}

.pitch-player.pos-TW{border-left:3px solid #1e88e5}

.pitch-player.pos-IV,
.pitch-player.pos-LV,
.pitch-player.pos-RV{
border-left:3px solid #6d4c41;
}

.pitch-player.pos-ZM,
.pitch-player.pos-LM,
.pitch-player.pos-RM{
border-left:3px solid #8e24aa;
}

.pitch-player.pos-ST{
border-left:3px solid #e53935;
}

/* 🔥 SELECTED */
.player-chip.selected{
outline:2px solid #ffd54f;
box-shadow:0 0 6px rgba(255,213,79,.4);
transform:scale(1.03);
}

/* 🔥 HOVER ACTION BUTTONS */
.player-chip:hover button{
opacity:1;
}

/* 🔥 BUTTON STYLE – CLEAN GAME LOOK */
.player-chip button{
margin-left:6px;
width:18px;
height:18px;

display:flex;
align-items:center;
justify-content:center;

padding:0;
font-size:10px;

border-radius:5px;
flex-shrink:0;

/* 🔥 DEZENT STANDARD */
background:rgba(255,255,255,0.06);
color:#bbb;
border:1px solid rgba(255,255,255,0.08);

opacity:0;
transition:.15s;
}

/* 🔥 BEI HOVER SICHTBAR */
.player-chip:hover button{
opacity:1;
}

/* ✏️ EDIT */
.player-chip button:first-of-type:hover{
background:rgba(255,213,79,0.2);
color:#ffd54f;
border-color:rgba(255,213,79,0.4);
}

/* ❌ DELETE */
.player-chip button:last-of-type:hover{
background:rgba(201,42,42,0.2);
color:#ff4d4d;
border-color:rgba(201,42,42,0.4);
}

.pos{
font-size:8px;
opacity:.5;
margin-right:4px;
}

.section-title{
margin-top:10px;
font-size:12px;
color:#aaa
}

.event{
display:flex;
justify-content:space-between;
align-items:center;
font-size:13px;
margin:2px 0;
padding:4px 6px;
border-radius:6px;
}

/* 🔥 NEUES EVENT */
.event.new{
animation:fadeInUp 0.35s ease;
}

/* 🔥 EVENT FARBEN */
.event.goal{
background:rgba(47,158,68,0.15);
}

.event.yellow{
background:rgba(212,160,23,0.15);
}

.event.red{
background:rgba(201,42,42,0.15);
}

.event.sub{
background:rgba(108,99,255,0.15);
}

@keyframes fadeInUp{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.stat-row{
display:flex;
justify-content:space-between;
padding:4px 0;
border-bottom:1px solid #333
}

.hidden{display:none}

.team-chip{
flex:1;
background:#1f1f1f;
padding:8px 10px;
border-radius:10px;
font-size:13px;
border:1px solid rgba(255,255,255,0.06);
transition:.2s;
}

.team-chip:hover{
background:#222;
}

/* 🔥 ACTIVE CLEAN */
.team-chip.active{
background:linear-gradient(90deg,#3a7cff,#6c63ff);
color:#fff;
border:none;
box-shadow:0 6px 20px rgba(58,124,255,0.25);
}

.pitch-wrap{
display:flex;
gap:20px;
align-items:flex-start;
justify-content:center;
margin-top:14px
}

.pitch{
background:#1f4d2b;
box-shadow:inset 0 0 20px rgba(0,0,0,0.6);
border:2px solid #2d7c44;
border-radius:10px;
padding:14px;
width:300px;
height:220px;
position:relative;
overflow:hidden;

display:flex;
flex-direction:column;
justify-content:flex-end; /* Team nach unten schieben */
}

  /* Mittellinie */
.pitch::before{
content:"";
position:absolute;
left:0;
right:0;
top:50%;
height:2px;
background:rgba(255,255,255,0.15);
}

/* Mittelkreis */
.pitch::after{
content:"";
position:absolute;
width:80px;
height:80px;
border:2px solid rgba(255,255,255,0.15);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

  /* Strafraum oben */
.pitch{
background:
linear-gradient(rgba(255,255,255,0.12),rgba(255,255,255,0.12)) top center / 140px 60px no-repeat,
linear-gradient(rgba(255,255,255,0.12),rgba(255,255,255,0.12)) bottom center / 140px 60px no-repeat,
#1f4d2b;
}

.pitch-row{
display:flex;
justify-content:center;
gap:8px;
margin:10px 0;
}

.pitch-player{
background:#2a2a2a;
padding:5px 7px;
border-radius:6px;
margin:2px;
font-size:11px;
transition:.15s;
}

.pitch-player:hover{
transform:scale(1.1);
background:#3a7cff;
}

.bench{
border-left:2px dashed #666;
padding-left:8px;
min-width:90px
}

.bench h4{
margin:0 0 6px 0;
font-size:11px;
color:#aaa
}

.bench-player{
background:#2b2b2b;
padding:4px 6px;
border-radius:5px;
margin:3px 0;
font-size:11px
}

.match.open{
width:100%;
max-width:none;
margin:0;
}

  .match.open{
box-shadow:0 0 25px rgba(58,124,255,0.25);
transform:none;
}

  .match-header span{
font-size:18px;
font-weight:bold;
}

.app{
display:flex;
gap:30px;
}

.sidebar{
width:220px;
background:#0e0e0e;
padding:18px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.05);
height:fit-content;
position:sticky;
top:20px;

/* 🔥 NEU */
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.sidebar h1{
font-size:20px;
margin-bottom:10px;
}

.sidebar-section{
margin-bottom:20px;
background:#141414;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.05);
box-shadow:0 6px 20px rgba(0,0,0,0.5);
}

/* Inputs NICHT mehr full width */
.sidebar input,
.sidebar select{
margin-bottom:8px;
background:#1a1a1a;
color:#eee;
}

/* TEAM */
#teamName{
width:70%;
}

/* SPIELER */
#playerName{
width:55%;
}

#playerPosition{
width:20%;
}

/* BUTTONS */
.sidebar-section button{
width:100%;
}

/* MAIN */
.main{
flex:1.3;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:#1a1a1a;
padding:20px;
border-radius:12px;
width:300px;
max-height:70vh;
overflow-y:auto;

display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

  .player-stats{
padding:6px 10px;
background:#151515;
border-left:2px solid #3a7cff;
margin-bottom:6px;
border-radius:6px;
}

  .player-chip.small{
display:inline-flex;
width:auto;
padding:3px 6px;
font-size:11px;
margin:2px;
}

  .player-chip span{
overflow:hidden;
text-overflow:ellipsis;
}

.match-main{
display:grid;

/* 🔥 gleichmäßige Verteilung + stabil */
grid-template-columns: 1fr auto 1fr;

align-items:center;

/* 🔥 etwas tighter */
gap:6px;

font-weight:bold;
font-size:14px;
margin-bottom:6px;
}

.team-left,
.team-right{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;

overflow:hidden;

align-items:center;
height:44px;
font-size:14px;
line-height:1.2;

min-width:0;
}

/* LINKS */
.team-left{
justify-content:flex-start;
text-align:left;
padding-right:6px;
}

/* RECHTS */
.team-right{
justify-content:flex-end;
text-align:right;
padding-left:6px;
}

.score{
font-size:24px;
font-weight:bold;
letter-spacing:1px;

display:flex;
align-items:center;
justify-content:center;

min-width:70px;
}

.match:not(.open):hover{
transform:translateY(-3px);
box-shadow:0 14px 40px rgba(0,0,0,0.7);
border-color:rgba(58,124,255,0.6);
}

  /* 🔥 RESULT COLORS */

.match.result-Sieg{
border-color: rgba(47,158,68,0.5);
}

.match.result-Niederlage{
border-color: rgba(201,42,42,0.5);
}

.match.result-Unentschieden{
border-color: rgba(255,255,255,0.08);
}

/* 🔥 HOVER VERSTÄRKEN */

.match.result-Sieg:hover{
box-shadow: 0 10px 30px rgba(47,158,68,0.25);
}

.match.result-Niederlage:hover{
box-shadow: 0 10px 30px rgba(201,42,42,0.25);
}

.match.result-Unentschieden:hover{
box-shadow: 0 10px 30px rgba(255,255,255,0.08);
}

  .player-left{
display:flex;
align-items:center;
gap:6px;
overflow:hidden;
}

.player-name{
overflow:hidden;
text-overflow:ellipsis;
}

.player-actions{
display:flex;
gap:4px;
flex-shrink:0;
}

/* 🔥 BADGE STYLE */
.pos-badge{
min-width:22px;
text-align:center;
font-size:9px;
padding:2px 4px;
border-radius:4px;
background:rgba(0,0,0,0.3);
opacity:.8;
}

  .toast{
position:fixed;
top:20px;
right:20px;
background:#1f1f1f;
color:#fff;
padding:10px 14px;
border-radius:8px;
font-size:13px;
box-shadow:0 6px 20px rgba(0,0,0,0.5);
opacity:0;
transform:translateY(-10px);
transition:.25s;
z-index:2000;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

/* Typen */
.toast.goal{border-left:4px solid #2f9e44}
.toast.yellow{border-left:4px solid #d4a017}
.toast.red{border-left:4px solid #c92a2a}
.toast.sub{border-left:4px solid #6c63ff}
.toast.info{border-left:4px solid #3a7cff}

.team-name{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;

overflow:hidden;

line-height:1.25;

/* 🔥 WICHTIG */
text-align:left;

/* 🔥 verhindert "nach rechts gedrückt werden" */
margin-left:0;
margin-right:0;

/* 🔥 optional max width */
max-width:220px;
}

/* 🔥 Button bekommt Abstand */
.match-header .danger{
margin-left:10px;
}

  /* 🔥 ANIMATION */
.match{
transition:
transform 0.2s ease,
box-shadow 0.2s ease,
border-color 0.2s ease,
max-height 0.35s ease;
}

/* BODY ANIMATION */
.match-body{
display:none;
}

.match-body.open{
display:block;
animation:fadeSlide 0.25s ease;
}

  @keyframes fadeSlide{
from{
opacity:0;
transform:translateY(-6px);
}
to{
opacity:1;
transform:translateY(0);
}
}

  .hero-banner-img{
  width:100%;
  height:120px;
  border-radius:14px;
  margin-bottom:20px;
    
background:url("./img/matchtracker_banner.png") center/contain no-repeat;
background-color:#0f0f0f;

  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.section-banner{
  height:40px;              /* 🔥 kleiner */
  border-radius:6px;
  margin-bottom:14px;

  background-repeat:no-repeat;
  background-size:contain;
  background-position:left center;

  /* 🔥 entschärfen */
  opacity:0.85;
  filter:brightness(0.9) contrast(0.95);

  padding-left:4px;
}

/* 🔵 TEAMS BANNER */
.section-banner.teams{
  background:url("./img/matchtracker_teams.png") left center/contain no-repeat;
}

.section-banner.players{
  background:url("./img/matchtracker_player.png") left center/contain no-repeat;
}

.add-btn{
width:100%;
justify-content:center;
white-space:nowrap;

background:#1a1a1a;              /* statt gradient */
color:#aaa;                      /* dezenter */

font-weight:500;
border:1px solid rgba(255,255,255,0.08);

box-shadow:none;                 /* kein glow mehr */

display:flex;
align-items:center;
justify-content:center;
height:42px;
font-size:13px;
gap:8px;

transition:.2s;
}

.add-btn:hover{
background:#222;
color:#fff;
border-color:rgba(255,255,255,0.2);
}

 .player-chip::after{
content:"";
position:absolute;
top:0;
right:0;
width:6px;
height:6px;
background:rgba(255,255,255,0.2);
clip-path:polygon(100% 0, 0 0, 100% 100%);
opacity:.4;
} 

  .team-row{
display:flex;
align-items:center;
justify-content:space-between;
gap:8px;
margin-top:6px;
    cursor:pointer;
}

#teamList{
margin-top:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.team-row button{
width:30px;
height:30px;
padding:0;
border-radius:8px;
background:#1a1a1a;
color:#aaa;
border:none;
}

  /* 🔥 FORM WRAPPER */
.match-form-row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:12px;
}

/* 🔥 EINHEITLICHER LOOK */
.match-form-row input,
.match-form-row select{
height:42px;
padding:0 12px;
border-radius:10px;

background:#1a1a1a;
color:#eee;

border:1px solid rgba(255,255,255,0.08);

transition:.2s;
}

/* 🔥 HOVER / FOCUS */
.match-form-row input:focus,
.match-form-row select:focus{
outline:none;
border-color:#3a7cff;
box-shadow:0 0 0 2px rgba(58,124,255,0.15);
}

/* 🔥 GRÖSSEN LOGIK */
#date{width:150px}
#time{width:110px}
#homeAway{width:130px}

/* FLEX INPUTS */
#opponent{flex:1}
#location{flex:1}

/* 🔥 ICON SELECT FIX */
#homeAway{
padding-left:10px;
}

/* 🔥 OPTIONAL: Platzhalter dezenter */
.match-form-row input::placeholder{
color:#777;
}

  .match-actions{
display:flex;
gap:10px;
align-items:center;
margin-top:6px;
}

.match-sub{
display:flex;
flex-direction:column;
gap:2px;
font-size:10px;
opacity:.75;
margin-top:8px;
}

.meta-top{
display:flex;
gap:10px;
align-items:center;
}

.meta-top span{
white-space:nowrap;
}

.meta-bottom{
display:flex;
align-items:center;
gap:8px;
}

.location{
display:inline-block;

max-width:140px;   /* 🔥 kleiner */
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;

font-size:9px;
opacity:.5;

line-height:1;
}

.meta-right{
margin-left:auto;   /* 🔥 FIX */
white-space:nowrap;
font-size:10px;
}

  .location{
display:flex;
align-items:center;
gap:4px;
}

  .location{
font-size:9px;
opacity:.5;
margin-top:2px;
}

  .topbar-inner{
  width:100%;
  max-width:1400px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:0 20px;
}

.hidden{display:none}

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">

    <div class="topbar-left"></div>

    <div class="topbar-right">
      <span id="topTeam">–</span>
      <span id="topWins">🏆 0</span>
      <span id="topPoints">⭐ 0</span>
      <span id="topMatches">📊 0</span>
      <span id="topGoals">⚽ 0</span>
      <span id="topAgainst">🥅 0</span>
      <span id="topYellow">🟨 0</span>
      <span id="topRed">🟥 0</span>
    </div>

  </div>
</div>
  
<div class="app">

<div class="sidebar">

<div class="sidebar-section">
<div class="section-banner teams"></div>
<button class="secondary add-btn" onclick="openModal('Neues Team','Teamname eingeben', addTeam)">
<span>➕</span> Team erstellen
</button>
<div id="teamList"></div>
</div>

<div class="sidebar-section">
<div class="section-banner players"></div>
<button class="secondary add-btn" onclick="openPlayerModal()">
<span>➕</span> Spieler hinzufügen
</button>
<div id="playerList" style="margin-top:10px"></div>
</div>

</div>
<div class="main">

<div class="hero-banner-img"></div>

  <div id="saveStatus" style="font-size:12px;opacity:.7;margin-top:-10px;margin-bottom:10px"></div>

<div class="panel">
<h2>Neues Spiel</h2>

<div class="match-form-row">

<input id="date" type="date">
<input id="opponent" placeholder="Gegner">
<input id="time" type="time">

<select id="homeAway">
  <option value="home">🏠 Heimspiel</option>
  <option value="away">🚗 Auswärtsspiel</option>
</select>

<input id="location" placeholder="Spielort (optional)">

</div>

<select id="mode">
<option value="7">7 gegen 7</option>
<option value="11">11 gegen 11</option>
</select>

<button class="primary" onclick="createMatch()">Spiel anlegen</button>

</div>
</div>

<div class="panel">
<h2>Spiele</h2>
<div id="matches" class="matches-grid"></div>
</div>

<div class="panel">
<h2>Top Scorer</h2>
<div id="scorerRanking"></div>
</div> <!-- main -->

  <div class="panel" style="opacity:.7">
<h3 style="font-size:13px;margin-bottom:8px">Tools</h3>

<button onclick="exportBackup()">💾 Backup</button>
<button class="secondary" onclick="document.getElementById('importFile').click()">📂 Laden</button>
<button class="secondary" onclick="forceSyncToServer()">☁️ Sync</button>

<input type="file" id="importFile" hidden>
</div>
  
</div>

<script>

/* =========================
DATA
========================= */

const API = "https://rare-kindness-production.up.railway.app"

/* 🔥 MODAL SYSTEM */
let modalCallback = null

function openModal(title, placeholder, callback){

// 🔥 IMMER RESET
modalCallback = null

let modal = document.getElementById("modal")
let box = modal.querySelector(".modal-box")

// 🔥 STANDARD LAYOUT IMMER NEU
box.innerHTML = `
<h3 id="modalTitle"></h3>
<input id="modalInput" placeholder="">
<button onclick="confirmModal()">OK</button>
<button onclick="closeModal()">Abbrechen</button>
`

// Titel + Input setzen
document.getElementById("modalTitle").innerText = title

let input = document.getElementById("modalInput")
input.value = ""
input.placeholder = placeholder || ""

// 🔥 AUTO FOCUS
setTimeout(()=>{
input.focus()
},50)

// 🔥 ENTER = BESTÄTIGEN
input.addEventListener("keydown", function(e){
if(e.key === "Enter"){
confirmModal()
}
})

// Callback setzen
modalCallback = callback

modal.classList.remove("hidden")
}

function closeModal(){
document.getElementById("modal").classList.add("hidden")
}

function confirmModal(){

let value = document.getElementById("modalInput").value

if(!modalCallback){
closeModal()
return
}

let cb = modalCallback
modalCallback = null

// 🔥 erst schließen
closeModal()

// 🔥 dann callback (wichtig!)
setTimeout(() => {
cb(value)
}, 50)

}

/* ========================= */

let data = {
teams:[],
players:[],
matches:[],
activeTeam:null
}

let teams = []
let players = []
let matches = []
let activeTeam = null

function loadFromServer(){

  fetch(API + "/data")
    .then(res => res.json())
    .then(serverData => {

      data = serverData

      teams = data.teams || []
      players = data.players || []
      matches = data.matches || []
      matches.forEach(m => m.open = false)
      activeTeam = data.activeTeam || teams[0] || null

      renderAll()
    })
    .catch(() => {
      console.log("Server nicht erreichbar")
    })
}

function save(){

  const status = document.getElementById("saveStatus")
  if(status) status.innerText = "Speichert…"

  data.teams = teams
  data.players = players
  data.matches = matches
  data.activeTeam = activeTeam

  // 🔥 LOCAL SPEICHERN
  localStorage.setItem("matchTrackerData", JSON.stringify(data))

  // 🔥 SERVER SPEICHERN (optional)
  fetch(API + "/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(() => {
    if(status){
      status.innerText = "✓ gespeichert"
      setTimeout(()=> status.innerText = "", 1500)
    }
  })
  .catch(() => {
    if(status) status.innerText = "⚠️ nur lokal gespeichert"
  })
}

function forceSyncToServer(){
  save()
  alert("Server wurde überschrieben ✅")
}

function cell(p){
return p
? `<div class='pitch-player pos-${p.pos}'><span class="pos">${p.pos}</span>${p.name}</div>`
: `<div class='pitch-player' style='opacity:.25'>·</div>`
}

  function showToast(text,type="info"){

let t = document.getElementById("toast")

t.className = "toast " + type
t.innerText = text

// trigger animation
setTimeout(()=> t.classList.add("show"),10)

setTimeout(()=>{
t.classList.remove("show")
},2000)

}

/* =========================
BACKUP
========================= */

function exportBackup(){

const blob = new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
)

const a = document.createElement("a")

a.href = URL.createObjectURL(blob)
a.download = "match_tracker_backup.json"

a.click()

}

document.getElementById("importFile").addEventListener("change",function(e){

const file = e.target.files[0]
if(!file) return

const reader = new FileReader()

reader.onload = function(){

try{

data = JSON.parse(reader.result)

teams = data.teams
players = data.players
matches = data.matches
activeTeam = data.activeTeam
  
save()
renderAll()   // sofort anzeigen

}catch{

alert("Ungültige Backup Datei")

}

}

reader.readAsText(file)

})

/* =========================
TEAMS
========================= */

function addTeam(name){

if(!name) return

teams.push(name)
activeTeam = name

save()
renderAll()

}

  function openPlayerModal(){

if(!activeTeam){
alert("Kein Team ausgewählt")
return
}

openModal("Spieler hinzufügen","Name eingeben",(name)=>{

if(!name) return

let pos = prompt("Position (TW, IV, LV, RV, ZM, LM, RM, ST):","")

if(!pos) return

players.push({
team:activeTeam,
name:name,
pos:pos
})

save()
renderAll()

})

}

function selectTeam(name){

activeTeam=name
save()
renderAll()

}

function deleteTeam(name){

if(!confirm("Team löschen?")) return

teams = teams.filter(t=>t!==name)
players = players.filter(p=>p.team!==name)
matches = matches.filter(m=>m.team!==name)

activeTeam = teams[0] || null

save()
renderAll()

}

function renderTopbar(){

document.getElementById("topTeam").innerText =
activeTeam ? activeTeam : "Kein Team"

let matchCount = matches
.filter(m=>m.team===activeTeam && m.events.length > 0)
.length

  let wins = matches.filter(m=>{
  if(m.team !== activeTeam || m.events.length === 0) return false

  let g = m.events.filter(e=>e.type==="goal").length
  let a = m.events.filter(e=>e.type==="goalAgainst").length

  return g > a
}).length

let goals = 0
  let points = 0
let againstTotal = 0
let yellow = 0
let red = 0

matches
.filter(m=>m.team===activeTeam && m.events.length > 0)
.forEach(m=>{

let g = m.events.filter(e=>e.type==="goal").length
let a = m.events.filter(e=>e.type==="goalAgainst").length

goals += g
againstTotal += a

yellow += m.events.filter(e=>e.type==="yellow").length
red += m.events.filter(e=>e.type==="red").length

// Punkte berechnen
if(g > a) points += 3
else if(g === a) points += 1

})

document.getElementById("topWins").innerText =
"🏆 " + wins

document.getElementById("topMatches").innerText =
"📊 " + matchCount

document.getElementById("topPoints").innerText =
"⭐ " + points

document.getElementById("topGoals").innerText =
"⚽ " + goals

document.getElementById("topAgainst").innerText =
"🥅 " + againstTotal

document.getElementById("topYellow").innerText =
"🟨 " + yellow

document.getElementById("topRed").innerText =
"🟥 " + red

}
  
function renderTeams(){

let html=""

teams.forEach(t=>{

let cls = t===activeTeam ? "team-chip active" : "team-chip"

html+=`
<div class="team-row" onclick='selectTeam(${JSON.stringify(t)})'>
  <span class="${cls}">${t}</span>
  <button onclick='event.stopPropagation(); deleteTeam(${JSON.stringify(t)})'>🗑</button>
</div>
`

})

document.getElementById("teamList").innerHTML=html

}

/* =========================
PLAYERS
========================= */

function deletePlayer(name){

players = players.filter(p=>p.name!==name)

save()
renderAll()

}

function editPlayer(name){

let p = players.find(x=>x.name===name)
if(!p) return

let oldName = p.name

let newName = prompt("Neuer Name:", p.name)
if(newName===null || newName.trim()==="") return

let newPos = prompt("Neue Position (TW, IV, LV, RV, ZM, LM, RM, ST):", p.pos)
if(newPos===null || newPos.trim()==="") return

newName = newName.trim()
newPos = newPos.trim()

// Spieler aktualisieren
p.name = newName
p.pos = newPos

// 🔥 ALLE MATCHES UPDATEN
matches.forEach(match=>{

// Startelf
match.lineup = match.lineup.map(n => n===oldName ? newName : n)

// Bank
match.bench = match.bench.map(n => n===oldName ? newName : n)

// Events
match.events.forEach(ev=>{
if(ev.player===oldName) ev.player = newName
if(ev.in===oldName) ev.in = newName
})

})

save()
renderAll()

}

function renderPlayers(){

let html=""

let order = ["TW","IV","LV","RV","ZM","LM","RM","ST"]

players
.filter(p=>p.team===activeTeam)
.sort((a, b) => {
  return (order.indexOf(a.pos) === -1 ? 99 : order.indexOf(a.pos)) 
       - (order.indexOf(b.pos) === -1 ? 99 : order.indexOf(b.pos))
})
.forEach((p)=>{

html+=`
<div class="player-chip pos-${p.pos}">

<div class="player-left">
<span class="pos-badge">${p.pos}</span>
<span class="player-name">${p.name}</span>
</div>

<div class="player-actions">
<button onclick="editPlayer('${p.name}')">✏️</button>
<button onclick="deletePlayer('${p.name}')">x</button>
</div>

</div>
`

})

document.getElementById("playerList").innerHTML=html

}

/* =========================
MATCHES
========================= */

function formatDate(d){

if(!d) return ""
let p=d.split("-")
return p[2]+"-"+p[1]+"-"+p[0]

}

function createMatch(){

if(!activeTeam) return

matches.push({

id: Date.now(),
team: activeTeam,

date: document.getElementById("date").value,
time: document.getElementById("time").value,
opponent: document.getElementById("opponent").value,
mode: document.getElementById("mode").value,

homeAway: document.getElementById("homeAway").value,
location: document.getElementById("location").value.trim(),

squad:[], 
lineup:[],
bench:[],
events:[],
twOverride:null,
open:false

})

save()
renderAll()

// 🔥 NEU: Inputs leeren
document.getElementById("date").value = ""
document.getElementById("time").value = ""
document.getElementById("opponent").value = ""
document.getElementById("mode").value = "7"
document.getElementById("homeAway").value = "home"
document.getElementById("location").value = ""

// 🔥 NEU: Feedback
showToast("Spiel erstellt ✅","info")

}

function toggleMatch(id){

let m = matches.find(x=>x.id===id)
m.open=!m.open

renderMatches()   // ❌ kein save mehr
}

function deleteMatch(id){

if(!confirm("Spiel löschen?")) return

matches = matches.filter(m=>m.id!==id)

save()
renderAll()

}

function toggleLineup(matchId,name){

let match = matches.find(m=>m.id===matchId)
let max = match.mode=="7"?7:11

let i = match.lineup.indexOf(name)

if(i>-1){

match.lineup.splice(i,1)

}else{

if(match.lineup.length>=max){
alert("Startelf voll")
return
}

match.lineup.push(name)

// 🔥 aus Bank entfernen
match.bench = match.bench.filter(p=>p!==name)

}

save()
renderMatches()

}

  function toggleBench(matchId,name){

let match = matches.find(m=>m.id===matchId)

let i = match.bench.indexOf(name)

if(i>-1){

match.bench.splice(i,1)

}else{

match.bench.push(name)

// aus Startelf entfernen
match.lineup = match.lineup.filter(p=>p!==name)

}

save()
renderMatches()

}

function toggleSquad(matchId,name){

let match = matches.find(m=>m.id===matchId)

let i = match.squad.indexOf(name)

if(i>-1){
match.squad.splice(i,1)

// 🔥 falls raus aus Kader → auch aus lineup/bench entfernen
match.lineup = match.lineup.filter(p=>p!==name)
match.bench = match.bench.filter(p=>p!==name)

}else{
match.squad.push(name)
}

save()
renderMatches()

}

/* =========================
EVENTS
========================= */

function chooseFrom(list,title,callback){

if(list.length===0){
alert("Keine Spieler verfügbar")
return
}

let modal = document.getElementById("modal")

// Titel setzen
document.getElementById("modalTitle").innerText = title

let input = document.getElementById("modalInput")
input.placeholder = "Spielername eingeben"
input.value = ""

// Liste merken
let names = list.join(", ")

// Callback neu setzen
modalCallback = (value)=>{
if(!value) return

if(!list.includes(value)){
alert("Spieler nicht gefunden:\n" + names)
return
}

callback(value)
}

// Modal öffnen
modal.classList.remove("hidden")
}

function addEvent(matchId,type){

let match = matches.find(m=>m.id==matchId)

// 🔥 Gegentor bleibt simpel
if(type==="goalAgainst"){

openModal("Minute eingeben","z.B. 23",(minute)=>{

if(!minute) return

match.events.push({
type:type,
minute:Number(minute)
})

save()
renderMatches()

})

return
}

// 🔥 STEP 1 → MINUTE
openModal("Minute eingeben","z.B. 23",(minute)=>{

if(!minute) return

minute = Number(minute)

// 🔥 SPIELER LISTE BAUEN
let teamPlayers = players
  .filter(p => p.team === match.team)

if(teamPlayers.length === 0){
alert("Keine Spieler im Team")
return
}

// 🔥 NUMMERIERTE LISTE
let listText = teamPlayers
  .map((p,i)=> (i+1) + ": " + p.name)
  .join("\n")

// 🔥 STEP 2 → AUSWAHL
// 🔥 STEP 2 → SPIELER KLICKEN

let modal = document.getElementById("modal")
let box = modal.querySelector(".modal-box")

// Titel setzen
box.innerHTML = `<h3>Spieler wählen</h3>`

teamPlayers.forEach(p=>{
let btn = document.createElement("button")

btn.innerText = p.name
btn.classList.add("secondary")

btn.onclick = ()=>{

let m = matches.find(x => x.id === matchId)

if(!m){
alert("Match nicht gefunden")
return
}

closeModal()

m.events.push({
type:type,
player:p.name,
minute:minute
})

save()
renderAll()

// 🔥 TOAST
if(type==="goal") showToast("⚽ Tor gespeichert","goal")
else if(type==="yellow") showToast("🟨 Gelbe Karte","yellow")
else if(type==="red") showToast("🟥 Rote Karte","red")
else if(type==="penalty") showToast("⏱ Zeitstrafe","info")
}

box.appendChild(btn)
})

// Abbrechen Button
let cancel = document.createElement("button")
cancel.innerText = "Abbrechen"
cancel.onclick = closeModal
box.appendChild(cancel)

modal.classList.remove("hidden")

})

}

function deleteEvent(matchId,index){

let match=matches.find(m=>m.id===matchId)

match.events.splice(index,1)

save()
renderAll()

}

function addSubstitution(matchId){

let match=matches.find(m=>m.id==matchId)

openModal("Minute eingeben","z.B. 45",(minute)=>{

if(!minute) return

minute = Number(minute)

chooseFrom(match.lineup,"Wer geht raus?",(out)=>{

chooseFrom(match.bench,"Wer kommt rein?",(inp)=>{

match.lineup = match.lineup.filter(p=>p!==out)
match.lineup.push(inp)

match.bench = match.bench.filter(p=>p!==inp)
match.bench.push(out)

match.events.push({
type:"sub",
player:out,
in:inp,
minute:minute
})

save()
renderMatches()

})

})

})
}

/* 🔥 NEU: TW setzen */
function setGoalkeeper(matchId){

let match = matches.find(m=>m.id===matchId)

// nur Spieler aus Startelf wählen
chooseFrom(match.lineup,"Wer ist TW?",(player)=>{

match.twOverride = player

save()
renderMatches()

})

}

/* =========================
PITCH
========================= */

function renderPitch(match){

let list=match.lineup
let bench=match.bench

let teamPlayers = players.filter(p=>list.includes(p.name))

let gk

if(match.twOverride){
gk = players.find(p=>p.name===match.twOverride)
}else{
gk = teamPlayers.find(p=>p.pos==='TW')
}
  
let lv = teamPlayers.find(p=>p.pos==="LV")
let iv = teamPlayers.find(p=>p.pos==="IV")
let rv = teamPlayers.find(p=>p.pos==="RV")

let remainingDefs = teamPlayers.filter(p => ["LV","IV","RV"].includes(p.pos) && ![lv,iv,rv].includes(p))

let def1 = lv || remainingDefs.shift()
let def2 = iv || remainingDefs.shift()
let def3 = rv || remainingDefs.shift()

  let lm = teamPlayers.find(p=>p.pos==="LM")
let zm = teamPlayers.find(p=>p.pos==="ZM")
let rm = teamPlayers.find(p=>p.pos==="RM")

let remainingMids = teamPlayers.filter(p => ["LM","ZM","RM"].includes(p.pos) && ![lm,zm,rm].includes(p))

let mid1 = lm || remainingMids.shift()
let mid2 = zm || remainingMids.shift()
let mid3 = rm || remainingMids.shift()
  
let strs = teamPlayers.filter(p => p.pos === "ST")

let st1 = strs[0] || null
let st2 = strs[1] || null

function row(players){

// 🔥 null entfernen
let clean = players.filter(p => p)

// 🔥 wenn leer → nichts anzeigen
if(clean.length === 0) return ""

// 🔥 normal rendern
let html = clean.map(p => cell(p)).join("")

return `<div class='pitch-row'>${html}</div>`
}

let html="<div class='pitch-wrap'>"

html+="<div class='pitch'>"

// 🔥 STURM
html += row([st1, st2])

// 🔥 MITTELFELD
html += row([mid1, mid2, mid3])

// 🔥 VERTEIDIGUNG
html += row([def1, def2, def3])

// 🔥 TORWART
if(gk){
html += `<div class='pitch-row'>${cell(gk)}</div>`
}

html+="</div>"

html+="<div class='bench'><h4>Bank</h4>"

bench.forEach(n=>{

let p=players.find(pl=>pl.name===n)

html+=`
<div class='bench-player'>
<span class="pos">${p.pos}</span>${n}
</div>
`

})

html+="</div>"
html+="</div>"

return html

}

/* =========================
RENDER
========================= */

function renderMatches(){

let html=""

matches
.filter(m=>m.team===activeTeam)
.forEach(match=>{

if(!match.squad) match.squad = []

let goals = match.events.filter(e=>e.type==="goal").length
let against = match.events.filter(e=>e.type==="goalAgainst").length

let resultText = "-"
let resultColor = "#666"

if(match.events.length > 0){

  if(goals > against){
    resultColor = "#2f9e44"
    resultText = "Sieg"
  }
  else if(goals < against){
    resultColor = "#c92a2a"
    resultText = "Niederlage"
  }
  else{
    resultColor = "#aaa"
    resultText = "Unentschieden"
  }

}

let arrow = match.open ? "▼" : "▶"

html+=`

<div class="match ${match.open ? "open" : ""} result-${resultText}">

<div class="match-header" onclick="toggleMatch(${match.id})">

<div class="match-main">

<div class="team-left">
${activeTeam}
</div>

<div class="score" style="color:${resultColor}">
${goals} : ${against}
</div>

<div class="team-right">
  <div class="team-name">${match.opponent}</div>
</div>

</div>

<div class="match-sub">

  <div class="meta-top">
    <span>${formatDate(match.date)}</span>
    <span>${match.time ? "🕒 "+match.time : ""}</span>
    <span>${match.homeAway === "away" ? "🚗" : "🏠"}</span>

    <span class="meta-right">
      ${match.lineup.length}/${match.mode} · 
      <span style="color:${resultColor}">${resultText}</span>
    </span>
  </div>

  ${match.location ? `
  <div class="location">
    📍 ${match.location}
  </div>
  ` : ""}

</div>

<button class="danger"
onclick="event.stopPropagation();deleteMatch(${match.id})">
🗑
</button>

</div>

<div class="match-body ${match.open ? 'open' : ''}">

<div class="section-title">
Kader (${match.squad?.length || 0} Spieler)
</div>
`

players
.filter(p=>p.team===activeTeam)
.sort((a, b) => {
  const group = {
    TW: 1,
    IV: 2, LV: 2, RV: 2,
    ZM: 3, LM: 3, RM: 3,
    ST: 4
  }

  return (group[a.pos] || 99) - (group[b.pos] || 99)
})
.forEach(p=>{

let active = match.squad?.includes(p.name) ? "selected" : ""

html+=`
<span class="player-chip small pos-${p.pos} ${active}"
onclick='toggleSquad(${match.id}, ${JSON.stringify(p.name)})'>

<span class="pos">${p.pos}</span>${p.name}

</span>
`
})

html+=`<div class="section-title">Startelf</div>`

const order = ["TW","IV","LV","RV","ZM","LM","RM","ST"]

players
.filter(p=>{
return p.team===activeTeam
&& (match.squad?.length ? match.squad.includes(p.name) : true)
&& !match.bench.includes(p.name)
})
.sort((a, b) => {
  const group = {
    TW: 1,
    IV: 2, LV: 2, RV: 2,
    ZM: 3, LM: 3, RM: 3,
    ST: 4
  }

  return (group[a.pos] || 99) - (group[b.pos] || 99)
})
.forEach(p=>{

let active = match.lineup.includes(p.name)?"selected":""

html+=`
<span class="player-chip small pos-${p.pos} ${active}"
onclick='toggleLineup(${match.id}, ${JSON.stringify(p.name)})'>

<span class="pos">${p.pos}</span>${p.name}

</span>
`

})

html+=`<div class="section-title">Bank wählen</div>`

players
.filter(p=>{
return p.team===activeTeam
&& (match.squad?.length ? match.squad.includes(p.name) : true)
&& !match.lineup.includes(p.name)
})
.sort((a,b)=>order.indexOf(a.pos)-order.indexOf(b.pos))
.forEach(p=>{

let active = match.bench.includes(p.name)?"selected":""

html+=`
<span class="player-chip small pos-${p.pos} ${active}"
onclick='toggleBench(${match.id}, ${JSON.stringify(p.name)})'>

<span class="pos">${p.pos}</span>${p.name}

</span>
`

})

html+=renderPitch(match)

html+=`

<button class="secondary"
onclick="setGoalkeeper(${match.id})">🧤 TW setzen</button>

<div class="section-title">Events</div>

<button class="success"
onclick="addEvent(${match.id},'goal')">⚽ Tor</button>

<button class="secondary"
onclick="addEvent(${match.id},'goalAgainst')">🥅 Gegentor</button>

<button class="yellow"
onclick="addEvent(${match.id},'yellow')">🟨 Gelb</button>

<button class="red"
onclick="addEvent(${match.id},'red')">🟥 Rot</button>

<button class="secondary"
onclick="addEvent(${match.id},'penalty')">⏱ Zeitstrafe</button>

<button class="sub"
onclick="addSubstitution(${match.id})">🔁 Wechsel</button>

<button class="secondary"
onclick="copySquad(${match.id})">📑 Kader kopieren</button>

<button class="secondary"
onclick="copyReport(${match.id})">📋 Bericht kopieren</button>
`

match.events.sort((a,b)=>a.minute-b.minute)

match.events.forEach((e,i)=>{

let txt

if(e.type==="sub")
txt=`${e.minute}' 🔁 ${e.player} → ${e.in}`

else if(e.type==="goal")
txt=`${e.minute}' ⚽ ${e.player}`

  else if(e.type==="goalAgainst")
txt=`${e.minute}' 🥅 Gegner`

else if(e.type==="yellow")
txt=`${e.minute}' 🟨 ${e.player}`

else if(e.type==="red")
txt=`${e.minute}' 🟥 ${e.player}`

else if(e.type==="penalty")
txt=`${e.minute}' ⏱ Zeitstrafe ${e.player}`

let cls = e.type

html+=`
<div class="event ${cls} ${i === match.events.length-1 ? "new" : ""}">
<span>${txt}</span>
<button class="secondary"
onclick="deleteEvent(${match.id},${i})">❌</button>
</div>
`

})

html+="</div></div>"

})

document.getElementById("matches").innerHTML = html

}

SCORER
========================= */

function renderRankings(){

let goalMap={}

matches
.filter(m=>m.team===activeTeam)
.forEach(m=>{

m.events.forEach(ev=>{

if(ev.type==="goal"){

goalMap[ev.player] =
(goalMap[ev.player]||0)+1

}

})

})

let list = Object.entries(goalMap)
.sort((a,b)=>b[1]-a[1])

let html=""

list.forEach(([name,goals])=>{

let p = players.find(pl=>pl.name===name)

html+=`
<div class="stat-row" onclick="togglePlayerStats('${name}')">
<span><span class="pos">${p.pos}</span>${name}</span>
<span>${goals}</span>
</div>

<div id="player-${name}" class="player-stats hidden"></div>
`

})

document.getElementById("scorerRanking").innerHTML =
html || "Keine Tore"

}

  function togglePlayerStats(name){

let box = document.getElementById("player-"+name)

// toggle schließen
if(!box.classList.contains("hidden")){
box.classList.add("hidden")
return
}

// Daten sammeln
let html=""

matches
.filter(m=>m.team===activeTeam)
.forEach(m=>{

let goals = m.events.filter(e=>e.type==="goal" && e.player===name)

if(goals.length){

html+=`
<div style="padding:4px 0;border-bottom:1px solid #333;font-size:12px">
${formatDate(m.date)} vs ${m.opponent}<br>
⚽ ${goals.length} Tor(e)
</div>
`

}

})

box.innerHTML = html || "Keine Tore"
box.classList.remove("hidden")

}

/* SPIELBERICHT KOPIEREN */

function copyReport(matchId){

let match = matches.find(m=>m.id===matchId)

let text=""

  let goals = match.events.filter(e=>e.type==="goal").length
let against = match.events.filter(e=>e.type==="goalAgainst").length

text += "⚽ U10 Spielbericht\n\n"

text += activeTeam + " – " + match.opponent + "\n"
text += "🗓 " + formatDate(match.date)

if(match.time){
text += "  🕒 " + match.time
}

text += "\n\nEndstand\n"
text += goals + " : " + against + "\n\nSpielverlauf\n────────────\n"

  let scorers={}
  
match.events
.sort((a,b)=>a.minute-b.minute)
.forEach(e=>{
  
if(e.type==="goal"){

text += "⚽ " + e.minute + "' " + e.player + "\n"

scorers[e.player]=(scorers[e.player]||0)+1

}

else if(e.type==="goalAgainst")
text += "🥅 " + e.minute + "' Tor durch " + match.opponent + "\n"

else if(e.type==="yellow")
text += "🟨 " + e.minute + "' " + e.player + "\n"

else if(e.type==="red")
text += "🟥 " + e.minute + "' " + e.player + "\n"

else if(e.type==="penalty")
text += "⏱ " + e.minute + "' Zeitstrafe " + e.player + "\n"

else if(e.type==="sub")
text += "🔁 " + e.minute + "' " + e.player + " → " + e.in + "\n"

})

  text += "\nTore\n"

Object.entries(scorers).forEach(([name,count])=>{
text += name + " (" + count + ")\n"
})

navigator.clipboard.writeText(text)

alert("Spielbericht kopiert")

}

function copySquad(matchId){

let match = matches.find(m=>m.id===matchId)
if(!match) return

let text = "📑 Kader\n\n"

text += activeTeam + " – " + match.opponent + "\n"

// 🔥 ALLES IN EINE SAUBERE ZEILE BAUEN
let line = "🗓 " + formatDate(match.date)

// Uhrzeit
if(match.time){
line += "  🕒 " + match.time
}

// Heim / Auswärts
let place = match.homeAway === "away"
  ? "🚗 Auswärtsspiel"
  : "🏠 Heimspiel"

line += "  " + place

// Spielort (robust)
// 👉 EINMAL anhängen (OHNE Location)
text += line + "\n"

// 🔥 Spielort eigene Zeile
if(match.location && match.location.trim() !== ""){
  text += "📍 " + match.location.trim()
}

text += "\n\n────────────\n"

// 🔥 KADER
let squadList = match.squad?.length 
  ? match.squad 
  : players
      .filter(p=>p.team===activeTeam)
      .map(p=>p.name)

// Sortierung
const order = ["TW","IV","LV","RV","ZM","LM","RM","ST"]

let sorted = squadList
.map(name => players.find(p=>p.name===name))
.filter(Boolean)
.sort((a,b)=>{
return (order.indexOf(a.pos) === -1 ? 99 : order.indexOf(a.pos)) 
     - (order.indexOf(b.pos) === -1 ? 99 : order.indexOf(b.pos))
})

text += "👥 Kader\n"

sorted.forEach(p=>{
text += `${p.pos} ${p.name}\n`
})

navigator.clipboard.writeText(text)

showToast("📑 Kader kopiert","info")
}
