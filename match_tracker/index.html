  <div class="topbar">

    <span id="topTeam">–</span>
    <span id="topMatches">0 Spiele</span>

  </div>
</div>
  
<div class="app">

<div class="sidebar">

<h1>⚽ Tracker</h1>

<div class="sidebar-section">
<h3>Teams</h3>
<input id="teamName" placeholder="Neues Team">
<button onclick="addTeam()">+</button>
<div id="teamList"></div>
</div>

<div class="sidebar-section">
<h3>Spieler</h3>
<input id="playerName" placeholder="Name">
<select id="playerPosition">
<option value="">Pos</option>
<option>TW</option><option>IV</option><option>LV</option>
<option>RV</option><option>ZM</option><option>LM</option>
<option>RM</option><option>ST</option>
</select>
<button onclick="addPlayer()">+</button>
<div id="playerList"></div>
</div>

</div>

<div class="main">
<h1>⚽ Match Tracker</h1>

  <div id="saveStatus" style="font-size:12px;opacity:.7;margin-top:-10px;margin-bottom:10px"></div>

<div class="panel">
<h2>Neues Spiel</h2>

<input id="date" type="date">
<input id="opponent" placeholder="Gegner">
  <input id="time" type="time">

<select id="mode">
<option value="7">7 gegen 7</option>
<option value="11">11 gegen 11</option>
</select>

<button class="primary" onclick="createMatch()">Spiel anlegen</button>
</div>

<h2>Spiele</h2>
<div id="matches" class="matches-grid"></div>
</div>

<div class="panel">
<h2>Top Scorer</h2>
<div id="scorerRanking"></div>
</div> <!-- main -->

  <div class="panel" style="opacity:.7">
<h3 style="font-size:13px;margin-bottom:8px">Tools</h3>

<button onclick="exportBackup()">💾 Backup</button>
<button class="secondary" onclick="document.getElementById('importFile').click()">📂 Laden</button>
<button class="secondary" onclick="forceSyncToServer()">☁️ Sync</button>

<input type="file" id="importFile" hidden>
</div>
  
</div>

<script>

/* =========================
DATA
========================= */

const API = "https://rare-kindness-production.up.railway.app"

/* 🔥 MODAL SYSTEM */
let modalCallback = null

function openModal(title, placeholder, callback){

// 🔥 IMMER RESET
modalCallback = null

let modal = document.getElementById("modal")
let box = modal.querySelector(".modal-box")

// 🔥 STANDARD LAYOUT IMMER NEU
box.innerHTML = `
<h3 id="modalTitle"></h3>
<input id="modalInput" placeholder="">
<button onclick="confirmModal()">OK</button>
<button onclick="closeModal()">Abbrechen</button>
`

// Titel + Input setzen
document.getElementById("modalTitle").innerText = title

let input = document.getElementById("modalInput")
input.value = ""
input.placeholder = placeholder || ""

// 🔥 AUTO FOCUS
setTimeout(()=>{
input.focus()
},50)

// 🔥 ENTER = BESTÄTIGEN
input.addEventListener("keydown", function(e){
if(e.key === "Enter"){
confirmModal()
}
})

// Callback setzen
modalCallback = callback

modal.classList.remove("hidden")
}

function closeModal(){
document.getElementById("modal").classList.add("hidden")
}

function confirmModal(){

let value = document.getElementById("modalInput").value

if(!modalCallback){
closeModal()
return
}

let cb = modalCallback
modalCallback = null

// 🔥 erst schließen
closeModal()

// 🔥 dann callback (wichtig!)
setTimeout(() => {
cb(value)
}, 50)

}

/* ========================= */

let data = {
teams:[],
players:[],
matches:[],
activeTeam:null
}

let teams = []
let players = []
let matches = []
let activeTeam = null

function loadFromServer(){

  fetch(API + "/data")
    .then(res => res.json())
    .then(serverData => {

      data = serverData

      teams = data.teams || []
      players = data.players || []
      matches = data.matches || []
      matches.forEach(m => m.open = false)
      activeTeam = data.activeTeam || teams[0] || null

      renderAll()
    })
    .catch(() => {
      console.log("Server nicht erreichbar")
    })
}

function save(){

  const status = document.getElementById("saveStatus")
  if(status) status.innerText = "Speichert…"

  data.teams = teams
  data.players = players
  data.matches = matches
  data.activeTeam = activeTeam

  // 🔥 LOCAL SPEICHERN
  localStorage.setItem("matchTrackerData", JSON.stringify(data))

  // 🔥 SERVER SPEICHERN (optional)
  fetch(API + "/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(() => {
    if(status){
      status.innerText = "✓ gespeichert"
      setTimeout(()=> status.innerText = "", 1500)
    }
  })
  .catch(() => {
    if(status) status.innerText = "⚠️ nur lokal gespeichert"
  })
}

function forceSyncToServer(){
  save()
  alert("Server wurde überschrieben ✅")
}

function cell(p){
return p
? `<div class='pitch-player pos-${p.pos}'><span class="pos">${p.pos}</span>${p.name}</div>`
: `<div class='pitch-player' style='opacity:.25'>·</div>`
}

  function showToast(text,type="info"){

let t = document.getElementById("toast")

t.className = "toast " + type
t.innerText = text

// trigger animation
setTimeout(()=> t.classList.add("show"),10)

setTimeout(()=>{
t.classList.remove("show")
},2000)

}

/* =========================
BACKUP
========================= */

function exportBackup(){

const blob = new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
)

const a = document.createElement("a")

a.href = URL.createObjectURL(blob)
a.download = "match_tracker_backup.json"

a.click()

}

document.getElementById("importFile").addEventListener("change",function(e){

const file = e.target.files[0]
if(!file) return

const reader = new FileReader()

reader.onload = function(){

try{

data = JSON.parse(reader.result)

teams = data.teams
players = data.players
matches = data.matches
activeTeam = data.activeTeam
  
save()
renderAll()   // sofort anzeigen

}catch{

alert("Ungültige Backup Datei")

}

}

reader.readAsText(file)

})

/* =========================
TEAMS
========================= */

function addTeam(){

let name = document.getElementById("teamName").value.trim()
if(!name) return

teams.push(name)
activeTeam=name

document.getElementById("teamName").value=""

save()
renderAll()

}

function selectTeam(name){

activeTeam=name
save()
renderAll()

}

function deleteTeam(name){

if(!confirm("Team löschen?")) return

teams = teams.filter(t=>t!==name)
players = players.filter(p=>p.team!==name)
matches = matches.filter(m=>m.team!==name)

activeTeam = teams[0] || null

save()
renderAll()

}

function renderTopbar(){

document.getElementById("topTeam").innerText =
activeTeam ? activeTeam : "Kein Team"

let matchCount = matches
.filter(m=>m.team===activeTeam && m.events.length > 0)
.length

let goals = 0

matches
.filter(m=>m.team===activeTeam && m.events.length > 0)
.forEach(m=>{
goals += m.events.filter(e=>e.type==="goal").length
})

document.getElementById("topMatches").innerText =
matchCount + " Spiele"

document.getElementById("topGoals").innerText =
goals + " Tore"

}
  
function renderTeams(){

let html=""

PLAYERS
========================= */

function addPlayer(){

if(!activeTeam) return

players.push({
team:activeTeam,
name:playerName.value,
pos:playerPosition.value
})

playerName.value=""
save()
renderAll()

}

function deletePlayer(name){

players = players.filter(p=>p.name!==name)

save()
renderAll()

}

function editPlayer(name){

let p = players.find(x=>x.name===name)
if(!p) return

let oldName = p.name

let newName = prompt("Neuer Name:", p.name)
if(newName===null || newName.trim()==="") return

let newPos = prompt("Neue Position (TW, IV, LV, RV, ZM, LM, RM, ST):", p.pos)
if(newPos===null || newPos.trim()==="") return

newName = newName.trim()
newPos = newPos.trim()

// Spieler aktualisieren
p.name = newName
p.pos = newPos

// 🔥 ALLE MATCHES UPDATEN
matches.forEach(match=>{

// Startelf
match.lineup = match.lineup.map(n => n===oldName ? newName : n)

// Bank
match.bench = match.bench.map(n => n===oldName ? newName : n)

// Events
match.events.forEach(ev=>{
if(ev.player===oldName) ev.player = newName
if(ev.in===oldName) ev.in = newName
})

})

save()
renderAll()

}

function renderPlayers(){

let html=""

let order = ["TW","IV","LV","RV","ZM","LM","RM","ST"]

players
.filter(p=>p.team===activeTeam)
.sort((a,b)=>order.indexOf(a.pos)-order.indexOf(b.pos))
.forEach((p)=>{

html+=`
<div class="player-chip pos-${p.pos}">

<div class="player-left">
<span class="pos-badge">${p.pos}</span>
<span class="player-name">${p.name}</span>
</div>

<div class="player-actions">
<button onclick="editPlayer('${p.name}')">✏️</button>
<button onclick="deletePlayer('${p.name}')">x</button>
</div>

</div>
`

})

document.getElementById("playerList").innerHTML=html

}

/* =========================
MATCHES
========================= */

function formatDate(d){

if(!d) return ""
let p=d.split("-")
return p[2]+"-"+p[1]+"-"+p[0]

}

function createMatch(){

if(!activeTeam) return

matches.push({

id:Date.now(),
team:activeTeam,
date:date.value,
  time:time.value,
opponent:opponent.value,
mode:mode.value,
lineup:[],
bench:[],
events:[],
  twOverride:null,
open:false

})

save()
renderAll()

}

function toggleMatch(id){

let m = matches.find(x=>x.id===id)
m.open=!m.open

renderMatches()   // ❌ kein save mehr
}

function deleteMatch(id){

if(!confirm("Spiel löschen?")) return

matches = matches.filter(m=>m.id!==id)

save()
renderAll()

}

function toggleLineup(matchId,name){

let match = matches.find(m=>m.id===matchId)
let max = match.mode=="7"?7:11

let i = match.lineup.indexOf(name)

if(i>-1){

match.lineup.splice(i,1)

}else{

if(match.lineup.length>=max){
alert("Startelf voll")
return
}

match.lineup.push(name)

}

save()
renderMatches()

}

function toggleBench(matchId,name){

let match=matches.find(m=>m.id===matchId)

let i = match.bench.indexOf(name)

if(i>-1){

match.bench.splice(i,1)

}else{

if(match.bench.length>=3){
alert("Maximal 3 Bankspieler")
return
}

match.bench.push(name)

}

save()
renderMatches()

}

/* =========================
EVENTS
========================= */

function chooseFrom(list,title,callback){

if(list.length===0){
alert("Keine Spieler verfügbar")
return
}

let modal = document.getElementById("modal")

// Titel setzen
document.getElementById("modalTitle").innerText = title

let input = document.getElementById("modalInput")
input.placeholder = "Spielername eingeben"
input.value = ""

// Liste merken
let names = list.join(", ")

// Callback neu setzen
modalCallback = (value)=>{
if(!value) return

if(!list.includes(value)){
alert("Spieler nicht gefunden:\n" + names)
return
}

callback(value)
}

// Modal öffnen
modal.classList.remove("hidden")
}

function addEvent(matchId,type){

let match = matches.find(m=>m.id==matchId)

// 🔥 Gegentor bleibt simpel
if(type==="goalAgainst"){

openModal("Minute eingeben","z.B. 23",(minute)=>{

if(!minute) return

match.events.push({
type:type,
minute:Number(minute)
})

save()
renderMatches()

})

return
}

// 🔥 STEP 1 → MINUTE
openModal("Minute eingeben","z.B. 23",(minute)=>{

if(!minute) return

minute = Number(minute)

// 🔥 SPIELER LISTE BAUEN
let teamPlayers = players
  .filter(p => p.team === match.team)

if(teamPlayers.length === 0){
alert("Keine Spieler im Team")
return
}

// 🔥 NUMMERIERTE LISTE
let listText = teamPlayers
  .map((p,i)=> (i+1) + ": " + p.name)
  .join("\n")

// 🔥 STEP 2 → AUSWAHL
// 🔥 STEP 2 → SPIELER KLICKEN

let modal = document.getElementById("modal")
let box = modal.querySelector(".modal-box")

// Titel setzen
box.innerHTML = `<h3>Spieler wählen</h3>`

teamPlayers.forEach(p=>{
let btn = document.createElement("button")

btn.innerText = p.name
btn.classList.add("secondary")

btn.onclick = ()=>{

let m = matches.find(x => x.id === matchId)

if(!m){
alert("Match nicht gefunden")
return
}

closeModal()

m.events.push({
type:type,
player:p.name,
minute:minute
})

save()
renderAll()

// 🔥 TOAST
if(type==="goal") showToast("⚽ Tor gespeichert","goal")
else if(type==="yellow") showToast("🟨 Gelbe Karte","yellow")
else if(type==="red") showToast("🟥 Rote Karte","red")
else if(type==="penalty") showToast("⏱ Zeitstrafe","info")
}

box.appendChild(btn)
})

// Abbrechen Button
let cancel = document.createElement("button")
cancel.innerText = "Abbrechen"
cancel.onclick = closeModal
box.appendChild(cancel)

modal.classList.remove("hidden")

})

}

function deleteEvent(matchId,index){

let match=matches.find(m=>m.id===matchId)

match.events.splice(index,1)

save()
renderAll()

}

function addSubstitution(matchId){

let match=matches.find(m=>m.id==matchId)

openModal("Minute eingeben","z.B. 45",(minute)=>{

if(!minute) return

minute = Number(minute)

chooseFrom(match.lineup,"Wer geht raus?",(out)=>{

chooseFrom(match.bench,"Wer kommt rein?",(inp)=>{

match.lineup = match.lineup.filter(p=>p!==out)
match.lineup.push(inp)

match.bench = match.bench.filter(p=>p!==inp)
match.bench.push(out)

match.events.push({
type:"sub",
player:out,
in:inp,
minute:minute
})

save()
renderMatches()

})

})

})
}

/* 🔥 NEU: TW setzen */
function setGoalkeeper(matchId){

let match = matches.find(m=>m.id===matchId)

// nur Spieler aus Startelf wählen
chooseFrom(match.lineup,"Wer ist TW?",(player)=>{

match.twOverride = player

save()
renderMatches()

})

}

/* =========================
PITCH
========================= */

function renderPitch(match){

let list=match.lineup
let bench=match.bench

let teamPlayers = players.filter(p=>list.includes(p.name))

let gk

if(match.twOverride){
gk = players.find(p=>p.name===match.twOverride)
}else{
gk = teamPlayers.find(p=>p.pos==='TW')
}
  
let lv = teamPlayers.find(p=>p.pos==="LV")
let iv = teamPlayers.find(p=>p.pos==="IV")
let rv = teamPlayers.find(p=>p.pos==="RV")

let remainingDefs = teamPlayers.filter(p => ["LV","IV","RV"].includes(p.pos) && ![lv,iv,rv].includes(p))

let def1 = lv || remainingDefs.shift()
let def2 = iv || remainingDefs.shift()
let def3 = rv || remainingDefs.shift()

  let lm = teamPlayers.find(p=>p.pos==="LM")
let zm = teamPlayers.find(p=>p.pos==="ZM")
let rm = teamPlayers.find(p=>p.pos==="RM")

let remainingMids = teamPlayers.filter(p => ["LM","ZM","RM"].includes(p.pos) && ![lm,zm,rm].includes(p))

let mid1 = lm || remainingMids.shift()
let mid2 = zm || remainingMids.shift()
let mid3 = rm || remainingMids.shift()
  
let strs = teamPlayers.filter(p => p.pos === "ST")

let st1 = strs[0]
let st2 = strs[1]

function row(players){

// nur echte Spieler behalten (kein null)
let filtered = players.filter(p => p)

let html = filtered.map(p => cell(p)).join("")

return `<div class='pitch-row'>${html}</div>`
}

let html="<div class='pitch-wrap'>"

html+="<div class='pitch'>"

html+=row([st1,null,st2])
html+=row([mid1,mid2,mid3])
html+=row([def1,def2,def3])
html+=`<div class='pitch-row'>${cell(gk)}</div>`

html+="</div>"

html+="<div class='bench'><h4>Bank</h4>"

bench.forEach(n=>{

let p=players.find(pl=>pl.name===n)

html+=`
<div class='bench-player'>
<span class="pos">${p.pos}</span>${n}
</div>
`

})

html+="</div>"
html+="</div>"

return html

}

/* =========================
RENDER
========================= */

function renderMatches(){

let html=""

matches
.filter(m=>m.team===activeTeam)
.forEach(match=>{

let goals = match.events.filter(e=>e.type==="goal").length
let against = match.events.filter(e=>e.type==="goalAgainst").length

let resultText = "-"
let resultColor = "#666"

if(match.events.length > 0){

  if(goals > against){
    resultColor = "#2f9e44"
    resultText = "Sieg"
  }
  else if(goals < against){
    resultColor = "#c92a2a"
    resultText = "Niederlage"
  }
  else{
    resultColor = "#aaa"
    resultText = "Unentschieden"
  }

}

let arrow = match.open ? "▼" : "▶"

html+=`

<div class="match ${match.open ? "open" : ""} result-${resultText}">

<div class="match-header" onclick="toggleMatch(${match.id})">

<div class="match-main">

<div class="team-left">
${activeTeam}
</div>

<div class="score" style="color:${resultColor}">
${goals} : ${against}
</div>

<div class="team-right">
  <div class="team-name">${match.opponent}</div>
</div>

</div>

<div class="match-sub">
  <div class="match-meta">
<span>${formatDate(match.date)}</span>
<span>${match.time ? "🕒 "+match.time : ""}</span>
<span>${match.lineup.length}/${match.mode}</span>
<span style="color:${resultColor}">${resultText}</span>
</div>
</div>

<button class="danger"
onclick="event.stopPropagation();deleteMatch(${match.id})">
🗑
</button>

</div>

<div class="match-body ${match.open ? 'open' : ''}">

<div class="section-title">Startelf</div>
`

const order = ["TW","IV","LV","RV","ZM","LM","RM","ST"]

players
.filter(p=>p.team===activeTeam && !match.bench.includes(p.name))
.sort((a,b)=>order.indexOf(a.pos)-order.indexOf(b.pos))
.forEach(p=>{

let active = match.lineup.includes(p.name)?"selected":""

html+=`
<span class="player-chip small pos-${p.pos} ${active}"
onclick="toggleLineup(${match.id},'${p.name}')">

<span class="pos">${p.pos}</span>${p.name}

</span>
`

})

html+=`<div class="section-title">Bank wählen</div>`

players
.filter(p=>p.team===activeTeam && !match.lineup.includes(p.name))
.sort((a,b)=>order.indexOf(a.pos)-order.indexOf(b.pos))
.forEach(p=>{

let active = match.bench.includes(p.name)?"selected":""

html+=`
<span class="player-chip small pos-${p.pos} ${active}"
onclick="toggleBench(${match.id},'${p.name}')">

<span class="pos">${p.pos}</span>${p.name}

</span>
`

})

html+=renderPitch(match)

html+=`

<button class="secondary"
onclick="setGoalkeeper(${match.id})">🧤 TW setzen</button>

<div class="section-title">Events</div>

<button class="success"
onclick="addEvent(${match.id},'goal')">⚽ Tor</button>

<button class="secondary"
onclick="addEvent(${match.id},'goalAgainst')">🥅 Gegentor</button>

<button class="yellow"
onclick="addEvent(${match.id},'yellow')">🟨 Gelb</button>

<button class="red"
onclick="addEvent(${match.id},'red')">🟥 Rot</button>

<button class="secondary"
onclick="addEvent(${match.id},'penalty')">⏱ Zeitstrafe</button>

<button class="sub"
onclick="addSubstitution(${match.id})">🔁 Wechsel</button>

<button class="secondary"
onclick="copyReport(${match.id})">📋 Bericht kopieren</button>
`

match.events.sort((a,b)=>a.minute-b.minute)

match.events.forEach((e,i)=>{

let txt

if(e.type==="sub")
txt=`${e.minute}' 🔁 ${e.player} → ${e.in}`

else if(e.type==="goal")
txt=`${e.minute}' ⚽ ${e.player}`

  else if(e.type==="goalAgainst")
txt=`${e.minute}' 🥅 Gegner`

else if(e.type==="yellow")
txt=`${e.minute}' 🟨 ${e.player}`

else if(e.type==="red")
txt=`${e.minute}' 🟥 ${e.player}`

else if(e.type==="penalty")
txt=`${e.minute}' ⏱ Zeitstrafe ${e.player}`

let cls = e.type

html+=`
<div class="event ${cls} ${i === match.events.length-1 ? "new" : ""}">
<span>${txt}</span>
<button class="secondary"
onclick="deleteEvent(${match.id},${i})">❌</button>
</div>
`

})

html+="</div></div>"

})

document.getElementById("matches").innerHTML = html

}

/* =========================
SCORER
========================= */

function renderRankings(){

let goalMap={}

matches
.filter(m=>m.team===activeTeam)
.forEach(m=>{

m.events.forEach(ev=>{

if(ev.type==="goal"){

goalMap[ev.player] =
(goalMap[ev.player]||0)+1

}

})

})

let list = Object.entries(goalMap)
.sort((a,b)=>b[1]-a[1])

let html=""

list.forEach(([name,goals])=>{

let p = players.find(pl=>pl.name===name)

html+=`
<div class="stat-row" onclick="togglePlayerStats('${name}')">
<span><span class="pos">${p.pos}</span>${name}</span>
<span>${goals}</span>
</div>

<div id="player-${name}" class="player-stats hidden"></div>
`

})

document.getElementById("scorerRanking").innerHTML =
html || "Keine Tore"

}

  function togglePlayerStats(name){

let box = document.getElementById("player-"+name)

// toggle schließen
if(!box.classList.contains("hidden")){
box.classList.add("hidden")
return
}

// Daten sammeln
let html=""

matches
.filter(m=>m.team===activeTeam)
.forEach(m=>{

let goals = m.events.filter(e=>e.type==="goal" && e.player===name)

if(goals.length){

html+=`
<div style="padding:4px 0;border-bottom:1px solid #333;font-size:12px">
${formatDate(m.date)} vs ${m.opponent}<br>
⚽ ${goals.length} Tor(e)
</div>
`

}

})

box.innerHTML = html || "Keine Tore"
box.classList.remove("hidden")

}

/* SPIELBERICHT KOPIEREN */

function copyReport(matchId){

let match = matches.find(m=>m.id===matchId)

let text=""

  let goals = match.events.filter(e=>e.type==="goal").length
let against = match.events.filter(e=>e.type==="goalAgainst").length

text += "⚽ U10 Spielbericht\n\n"

text += activeTeam + " – " + match.opponent + "\n"
text += "🗓 " + formatDate(match.date)

if(match.time){
text += "  🕒 " + match.time
}

text += "\n\nEndstand\n"
text += goals + " : " + against + "\n\nSpielverlauf\n────────────\n"

  let scorers={}
  
match.events
.sort((a,b)=>a.minute-b.minute)
.forEach(e=>{
  
if(e.type==="goal"){

text += "⚽ " + e.minute + "' " + e.player + "\n"

scorers[e.player]=(scorers[e.player]||0)+1

}

else if(e.type==="goalAgainst")
text += "🥅 " + e.minute + "' Tor durch " + match.opponent + "\n"

else if(e.type==="yellow")
text += "🟨 " + e.minute + "' " + e.player + "\n"

else if(e.type==="red")
text += "🟥 " + e.minute + "' " + e.player + "\n"

else if(e.type==="penalty")
text += "⏱ " + e.minute + "' Zeitstrafe " + e.player + "\n"

else if(e.type==="sub")
text += "🔁 " + e.minute + "' " + e.player + " → " + e.in + "\n"

})

  text += "\nTore\n"

Object.entries(scorers).forEach(([name,count])=>{
text += name + " (" + count + ")\n"
})

navigator.clipboard.writeText(text)

alert("Spielbericht kopiert")

}
