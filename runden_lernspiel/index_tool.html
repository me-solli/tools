<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meph Smart Arrow</title>

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
  font-family:Arial;
}

.container{
  position:fixed;
  top:35%;
  left:30px;
  text-align:left;
  color:white;
}

.arrow{
  font-size:90px;
  opacity:0.7;
  animation:pulse 1.2s infinite;
}

.info{
  margin-top:10px;
  font-size:14px;
  opacity:0.7;
}

.warn{
  color:#ffcc00;
}

.danger{
  color:#ff4444;
  font-weight:bold;
}

@keyframes pulse{
  0%{opacity:0.3}
  50%{opacity:1}
  100%{opacity:0.3}
}
</style>
</head>

<body>

<div class="container">
  <div class="arrow" id="arrow">←</div>
  <div class="info" id="info">LEFT RULE</div>
</div>

<script>

let state = {
  dir:"LEFT",
  start:Date.now(),
  switched:false,
  warned:false,
  runs:0,
  goodRuns:0
}

// -------------------
// START AUTOMATISCH
// -------------------

startRun()

function startRun(){
  state.start = Date.now()
  state.switched = false
  state.warned = false
  state.dir = "LEFT"

  updateUI()
  speak("left")
}

// -------------------
// LOOP
// -------------------

setInterval(()=>{
  let t = (Date.now() - state.start)/1000

  // 🔥 nach 8s: leichter Hinweis
  if(t > 8 && !state.warned){
    setInfo("hmm… könnte falsch sein", "warn")
    state.warned = true
  }

  // 🔥 nach 14s: switch empfehlen
  if(t > 14 && !state.switched){
    switchDir()
  }

},500)

// -------------------
// SWITCH LOGIK
// -------------------

function switchDir(){
  state.dir = (state.dir === "LEFT") ? "RIGHT" : "LEFT"
  state.switched = true

  setInfo("SWITCH!", "danger")
  updateUI()

  speak("switch")
}

// -------------------
// UI
// -------------------

function updateUI(){
  document.getElementById("arrow").innerText =
    state.dir === "LEFT" ? "←" : "→"
}

function setInfo(text, type){
  let el = document.getElementById("info")
  el.innerText = text

  el.className = "info"

  if(type === "warn") el.classList.add("warn")
  if(type === "danger") el.classList.add("danger")
}

// -------------------
// HOTKEY RESET
// -------------------

document.addEventListener("keydown",(e)=>{
  if(e.key === "r"){
    startRun()
  }
})

// -------------------
// SOUND
// -------------------

function speak(text){
  let msg = new SpeechSynthesisUtterance(text)
  msg.volume = 0.2
  speechSynthesis.speak(msg)
}

</script>

</body>
</html>
